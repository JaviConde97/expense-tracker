<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .stat-card { border: none; border-radius: 12px; transition: transform 0.15s; }
        .stat-card:hover { transform: translateY(-2px); }
        .balance-positivo { color: #198754; }
        .balance-negativo { color: #dc3545; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <!-- Saludo y navegación de mes -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">
                Hola, <span sec:authentication="principal.nombre"></span> 👋
            </h2>
            <p class="text-muted mb-0">Resumen de <span th:text="${nombreMes} + ' ' + ${anioActual}"></span></p>
        </div>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/dashboard(mes=${mesAnterior}, anio=${anioAnterior})}"
               class="btn btn-outline-secondary btn-sm">&#8592;</a>
            <span class="small fw-medium px-1" th:text="${nombreMes}"></span>
            <a th:href="@{/dashboard(mes=${mesSiguiente}, anio=${anioSiguiente})}"
               class="btn btn-outline-secondary btn-sm">&#8594;</a>
            <a th:href="@{/dashboard}" class="btn btn-outline-dark btn-sm ms-1">Hoy</a>
        </div>
    </div>

    <!-- Tarjetas de estadísticas -->
    <div class="row g-3 mb-4">

        <div class="col-6 col-md-3">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body">
                    <p class="text-muted small mb-1">Ingresos del mes</p>
                    <h4 class="fw-bold text-success mb-0"
                        th:text="${#numbers.formatDecimal(totalIngresos, 1, 2)} + ' €'"></h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body">
                    <p class="text-muted small mb-1">Gastos del mes</p>
                    <h4 class="fw-bold text-danger mb-0"
                        th:text="${#numbers.formatDecimal(totalGastos, 1, 2)} + ' €'"></h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body">
                    <p class="text-muted small mb-1">Balance</p>
                    <h4 class="fw-bold mb-0"
                        th:classappend="${balance >= 0} ? 'balance-positivo' : 'balance-negativo'"
                        th:text="${#numbers.formatDecimal(balance, 1, 2)} + ' €'"></h4>
                </div>
            </div>
        </div>

        <div class="col-6 col-md-3">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body">
                    <p class="text-muted small mb-1">Nº gastos</p>
                    <h4 class="fw-bold text-dark mb-0" th:text="${numGastos}"></h4>
                </div>
            </div>
        </div>

    </div>

    <!-- Gráfica + Últimos gastos -->
    <div class="row g-3">

        <!-- Gráfica de gastos por categoría (Chart.js) -->
        <div class="col-12 col-lg-5">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h6 class="fw-semibold mb-3">Gastos por categoría</h6>
                    <div th:if="${chartLabels.isEmpty()}" class="text-center text-muted py-4">
                        <p class="mb-0">Sin gastos este mes</p>
                    </div>
                    <div th:if="${!chartLabels.isEmpty()}">
                        <canvas id="graficaGastos" style="max-height: 260px;"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- Últimos 5 gastos -->
        <div class="col-12 col-lg-7">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h6 class="fw-semibold mb-0">Gastos de <span th:text="${nombreMes}"></span></h6>
                        <a th:href="@{/gastos}" class="text-muted small text-decoration-none">Ver todos →</a>
                    </div>

                    <div th:if="${ultimosGastos.isEmpty()}" class="text-center text-muted py-4">
                        <p class="mb-2">Sin gastos registrados</p>
                        <a th:href="@{/gastos/nuevo}" class="btn btn-sm btn-dark">+ Añadir gasto</a>
                    </div>

                    <div th:if="${!ultimosGastos.isEmpty()}">
                        <div th:each="gasto : ${ultimosGastos}"
                             class="d-flex justify-content-between align-items-center py-2 border-bottom">
                            <div>
                                <p class="mb-0 fw-medium small" th:text="${gasto.titulo}"></p>
                                <p class="mb-0 text-muted" style="font-size: 0.75rem;"
                                   th:text="${gasto.categoria.nombre} + ' · ' + ${#temporals.format(gasto.fecha, 'dd/MM/yyyy')}"></p>
                            </div>
                            <span class="fw-bold small text-danger"
                                  th:text="${#numbers.formatDecimal(gasto.importe, 1, 2)} + ' €'"></span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div>

    <!-- Gráfico de barras anual: gastos vs ingresos por mes -->
    <div class="row g-3 mt-1">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <h6 class="fw-semibold mb-3">
                        Gastos e ingresos del año —
                        <span th:text="${anioActual}" class="text-muted fw-normal"></span>
                    </h6>
                    <canvas id="graficaAnual" style="max-height: 280px;"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Accesos rápidos -->
    <div class="d-flex gap-2 mt-3">
        <a th:href="@{/gastos/nuevo}" class="btn btn-dark btn-sm">+ Nuevo gasto</a>
        <a th:href="@{/ingresos/nuevo}" class="btn btn-success btn-sm">+ Nuevo ingreso</a>
    </div>

</div>

<!-- Chart.js desde CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script th:inline="javascript">
    // Datos inyectados desde el controlador via Thymeleaf inline
    const labels = /*[[${chartLabels}]]*/ [];
    const datos  = /*[[${chartData}]]*/ [];

    // Solo renderizamos la gráfica si hay datos
    if (labels.length > 0) {
        const ctx = document.getElementById('graficaGastos').getContext('2d');

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: datos,
                    backgroundColor: [
                        '#343a40', '#6c757d', '#adb5bd',
                        '#495057', '#868e96', '#ced4da'
                    ],
                    borderWidth: 2,
                    borderColor: '#fff'
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: { font: { size: 12 }, padding: 12 }
                    },
                    tooltip: {
                        callbacks: {
                            // Muestra el importe con € en el tooltip al pasar el ratón
                            label: function(context) {
                                return ' ' + context.label + ': ' + context.parsed.toFixed(2) + ' €';
                            }
                        }
                    }
                }
            }
        });
    }

    // --- Gráfico de barras anual (gastos vs ingresos por mes) ---
    const barLabels   = /*[[${barLabels}]]*/ [];
    const barGastos   = /*[[${barGastos}]]*/ [];
    const barIngresos = /*[[${barIngresos}]]*/ [];

    const ctxAnual = document.getElementById('graficaAnual').getContext('2d');
    new Chart(ctxAnual, {
        type: 'bar',
        data: {
            labels: barLabels,
            datasets: [
                {
                    label: 'Gastos',
                    data: barGastos,
                    backgroundColor: 'rgba(220, 53, 69, 0.75)',
                    borderColor: '#dc3545',
                    borderWidth: 1,
                    borderRadius: 4
                },
                {
                    label: 'Ingresos',
                    data: barIngresos,
                    backgroundColor: 'rgba(25, 135, 84, 0.75)',
                    borderColor: '#198754',
                    borderWidth: 1,
                    borderRadius: 4
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                    labels: { font: { size: 12 }, padding: 16 }
                },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return ' ' + context.dataset.label + ': ' + context.parsed.y.toFixed(2) + ' €';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        callback: function(value) { return value + ' €'; },
                        font: { size: 11 }
                    },
                    grid: { color: 'rgba(0,0,0,0.05)' }
                },
                x: {
                    ticks: { font: { size: 11 } },
                    grid: { display: false }
                }
            }
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
