<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .stat-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.15s;
        }
        .stat-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <!-- Saludo -->
    <div class="mb-4">
        <h2 class="fw-bold mb-1">
            Hola, <span sec:authentication="principal.nombre"></span> 👋
        </h2>
        <p class="text-muted mb-0">Aquí tienes el resumen de tus gastos.</p>
    </div>

    <!-- Tarjetas de estadísticas (placeholder hasta la Fase 4) -->
    <div class="row g-3 mb-4">
        <div class="col-12 col-md-4">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body">
                    <p class="text-muted small mb-1">Total este mes</p>
                    <h3 class="fw-bold text-dark mb-0">—</h3>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body">
                    <p class="text-muted small mb-1">Mayor gasto</p>
                    <h3 class="fw-bold text-dark mb-0">—</h3>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card stat-card shadow-sm h-100">
                <div class="card-body">
                    <p class="text-muted small mb-1">Nº de gastos</p>
                    <h3 class="fw-bold text-dark mb-0">—</h3>
                </div>
            </div>
        </div>
    </div>

    <!-- Aviso de construcción -->
    <div class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <div class="fs-1 mb-3">🚧</div>
            <h5 class="fw-semibold mb-2">Dashboard en construcción</h5>
            <p class="text-muted mb-4">Aquí aparecerán tus estadísticas y gráficas de gastos.</p>
            <a th:href="@{/gastos/nuevo}" class="btn btn-dark me-2">+ Añadir gasto</a>
            <a th:href="@{/gastos}" class="btn btn-outline-secondary">Ver mis gastos</a>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
