<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container d-flex align-items-center">

        <a class="navbar-brand fw-bold" th:href="@{/dashboard}">
            💸 Expense Tracker
        </a>

        <sec:authorize access="isAuthenticated()">
            <div class="d-flex align-items-center gap-3 ms-auto">
                <a class="text-light text-decoration-none small" th:href="@{/dashboard}">Dashboard</a>
                <a class="text-light text-decoration-none small" th:href="@{/gastos}">Gastos</a>
                <a class="text-light text-decoration-none small" th:href="@{/ingresos}">Ingresos</a>
                <span class="text-secondary">|</span>
                <span class="text-light small">👤 <span sec:authentication="principal.nombre"></span></span>
                <form th:action="@{/auth/logout}" method="post" class="mb-0">
                    <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
                </form>
            </div>
        </sec:authorize>

    </div>
</nav>

</body>
</html>
