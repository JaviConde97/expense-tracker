<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${ingresoId} ? 'Editar ingreso' : 'Nuevo ingreso'">Ingreso — Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-card { border: none; border-radius: 16px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-6">

            <h2 class="fw-bold mb-4"
                th:text="${ingresoId} ? 'Editar ingreso' : 'Nuevo ingreso'"></h2>

            <div class="card form-card shadow-sm">
                <div class="card-body p-4">

                    <form th:action="${ingresoId} ? @{/ingresos/{id}/editar(id=${ingresoId})} : @{/ingresos/nuevo}"
                          th:object="${ingresoDto}"
                          method="post">

                        <div class="mb-3">
                            <label for="titulo" class="form-label small fw-medium">Título</label>
                            <input type="text" class="form-control" id="titulo"
                                   th:field="*{titulo}" placeholder="Ej: Nómina mayo">
                            <div class="text-danger small mt-1" th:errors="*{titulo}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="importe" class="form-label small fw-medium">Importe (€)</label>
                            <input type="number" class="form-control" id="importe"
                                   th:field="*{importe}" placeholder="0.00"
                                   step="0.01" min="0.01">
                            <div class="text-danger small mt-1" th:errors="*{importe}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="fecha" class="form-label small fw-medium">Fecha</label>
                            <input type="date" class="form-control" id="fecha"
                                   th:field="*{fecha}">
                            <div class="text-danger small mt-1" th:errors="*{fecha}"></div>
                        </div>

                        <div class="mb-3">
                            <label for="tipo" class="form-label small fw-medium">Tipo</label>
                            <select class="form-select" id="tipo" th:field="*{tipo}">
                                <option value="">-- Selecciona un tipo --</option>
                                <option th:each="tipo : ${tipos}"
                                        th:value="${tipo.name()}"
                                        th:text="${tipo.nombre}">
                                </option>
                            </select>
                            <div class="text-danger small mt-1" th:errors="*{tipo}"></div>
                        </div>

                        <div class="mb-4">
                            <label for="descripcion" class="form-label small fw-medium">
                                Descripción <span class="text-muted fw-normal">(opcional)</span>
                            </label>
                            <textarea class="form-control" id="descripcion"
                                      th:field="*{descripcion}" rows="2"
                                      placeholder="Notas adicionales..."></textarea>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-success flex-grow-1"
                                    th:text="${ingresoId} ? 'Guardar cambios' : 'Añadir ingreso'"></button>
                            <a th:href="@{/ingresos}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
