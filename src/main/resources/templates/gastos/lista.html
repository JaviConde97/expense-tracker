<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis gastos — Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">

    <!-- Cabecera -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-1">Mis gastos</h2>
            <p class="text-muted mb-0" th:text="${gastos.size()} + ' gastos registrados'"></p>
        </div>
        <a th:href="@{/gastos/nuevo}" class="btn btn-dark">+ Nuevo gasto</a>
    </div>

    <!-- Sin gastos -->
    <div th:if="${gastos.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body text-center py-5">
            <div class="fs-1 mb-3">💸</div>
            <h5 class="fw-semibold mb-2">Todavía no tienes gastos</h5>
            <p class="text-muted mb-4">Añade tu primer gasto para empezar a llevar el control.</p>
            <a th:href="@{/gastos/nuevo}" class="btn btn-dark">+ Añadir gasto</a>
        </div>
    </div>

    <!-- Tabla de gastos -->
    <div th:if="${!gastos.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">Fecha</th>
                            <th>Título</th>
                            <th>Categoría</th>
                            <th>Subcategoría</th>
                            <th class="text-end">Importe</th>
                            <th class="text-end pe-4">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="gasto : ${gastos}">
                            <td class="ps-4 text-muted small align-middle"
                                th:text="${#temporals.format(gasto.fecha, 'dd/MM/yyyy')}"></td>
                            <td class="align-middle fw-medium" th:text="${gasto.titulo}"></td>
                            <td class="align-middle">
                                <span class="badge bg-secondary"
                                      th:text="${gasto.categoria.nombre}"></span>
                            </td>
                            <td class="align-middle text-muted small"
                                th:text="${gasto.subcategoria.nombre}"></td>
                            <td class="align-middle text-end fw-bold"
                                th:text="${#numbers.formatDecimal(gasto.importe, 1, 2)} + ' €'"></td>
                            <td class="align-middle text-end pe-4">
                                <a th:href="@{/gastos/{id}/editar(id=${gasto.id})}"
                                   class="btn btn-sm btn-outline-secondary me-1">Editar</a>
                                <form th:action="@{/gastos/{id}/eliminar(id=${gasto.id})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('¿Eliminar este gasto?')">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        Eliminar
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
