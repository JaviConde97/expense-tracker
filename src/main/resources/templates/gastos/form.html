<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${gastoId} ? 'Editar gasto' : 'Nuevo gasto'">Gasto — Expense Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .form-card { border: none; border-radius: 16px; }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-7 col-lg-6">

            <h2 class="fw-bold mb-4"
                th:text="${gastoId} ? 'Editar gasto' : 'Nuevo gasto'"></h2>

            <div class="card form-card shadow-sm">
                <div class="card-body p-4">

                    <!--
                      La action del formulario cambia según si estamos creando o editando.
                    -->
                    <form th:action="${gastoId} ? @{/gastos/{id}/editar(id=${gastoId})} : @{/gastos/nuevo}"
                          th:object="${gastoDto}"
                          method="post">

                        <!-- Título -->
                        <div class="mb-3">
                            <label for="titulo" class="form-label small fw-medium">Título</label>
                            <input type="text" class="form-control" id="titulo"
                                   th:field="*{titulo}" placeholder="Ej: Café en la oficina">
                            <div class="text-danger small mt-1" th:errors="*{titulo}"></div>
                        </div>

                        <!-- Importe -->
                        <div class="mb-3">
                            <label for="importe" class="form-label small fw-medium">Importe (€)</label>
                            <input type="number" class="form-control" id="importe"
                                   th:field="*{importe}" placeholder="0.00"
                                   step="0.01" min="0.01">
                            <div class="text-danger small mt-1" th:errors="*{importe}"></div>
                        </div>

                        <!-- Fecha -->
                        <div class="mb-3">
                            <label for="fecha" class="form-label small fw-medium">Fecha</label>
                            <input type="date" class="form-control" id="fecha"
                                   th:field="*{fecha}">
                            <div class="text-danger small mt-1" th:errors="*{fecha}"></div>
                        </div>

                        <!--
                          Subcategoría agrupada por categoría con <optgroup>.
                          El usuario elige directamente en qué gastó (ej: "Bares y restaurantes")
                          sin tener que saber previamente a qué categoría pertenece.
                          La categoría padre se deriva automáticamente en el servicio.
                        -->
                        <div class="mb-3">
                            <label for="subcategoria" class="form-label small fw-medium">¿En qué gastaste?</label>
                            <select class="form-select" id="subcategoria" th:field="*{subcategoria}">
                                <option value="">-- Selecciona el tipo de gasto --</option>
                                <optgroup th:each="cat : ${categorias}" th:label="${cat.nombre}">
                                    <option th:each="sub : ${subcategoriasPorCategoria[cat.name()]}"
                                            th:value="${sub['value']}"
                                            th:text="${sub['label']}">
                                    </option>
                                </optgroup>
                            </select>
                            <div class="text-danger small mt-1" th:errors="*{subcategoria}"></div>
                        </div>

                        <!-- Descripción (opcional) -->
                        <div class="mb-4">
                            <label for="descripcion" class="form-label small fw-medium">
                                Descripción <span class="text-muted fw-normal">(opcional)</span>
                            </label>
                            <textarea class="form-control" id="descripcion"
                                      th:field="*{descripcion}" rows="2"
                                      placeholder="Notas adicionales..."></textarea>
                        </div>

                        <!-- Botones -->
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-dark flex-grow-1">
                                <span th:text="${gastoId} ? 'Guardar cambios' : 'Añadir gasto'"></span>
                            </button>
                            <a th:href="@{/gastos}" class="btn btn-outline-secondary">Cancelar</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
<script>
    // Convierte el select en un campo buscable con Tom Select
    new TomSelect('#subcategoria', {
        placeholder: '-- Escribe para buscar --',
        allowEmptyOption: false,
        maxOptions: null
    });
</script>
</body>
</html>
